version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ocs_postgres
    environment:
      POSTGRES_USER: ocs_user
      POSTGRES_PASSWORD: ocs_password_2024
      POSTGRES_DB: opinion_collector
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d
    networks:
      - ocs_network

  backend:
    build: ./backend
    container_name: ocs_backend
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=opinion_collector
      - DB_USER=ocs_user
      - DB_PASSWORD=ocs_password_2024
      - JWT_SECRET=your_super_secret_jwt_key_change_this_in_production_2024
      - JWT_EXPIRES_IN=7d
      - OTP_EXPIRES_IN_MINUTES=5
      - MAX_FILE_SIZE=10485760
      - UPLOAD_PATH=./uploads
    depends_on:
      - postgres
    networks:
      - ocs_network
    command: npm start

  frontend:
    image: nginx:alpine
    container_name: ocs_frontend
    ports:
      - "168:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - ocs_network

volumes:
  postgres_data:

networks:
  ocs_network:
    driver: bridge