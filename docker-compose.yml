version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ocs_postgres
    environment:
      POSTGRES_USER: ocs_user
      POSTGRES_PASSWORD: ocs_password_2024
      POSTGRES_DB: opinion_collector
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d
    networks:
      - ocs_network

  backend:
    build: ./backend
    container_name: ocs_backend
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
    depends_on:
      - postgres
    networks:
      - ocs_network
    command: npm start

  frontend:
    image: nginx:alpine
    container_name: ocs_frontend
    ports:
      - "168:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - ocs_network

volumes:
  postgres_data:

networks:
  ocs_network:
    driver: bridge