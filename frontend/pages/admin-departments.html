<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý phòng ban - Admin</title>
   <link rel="stylesheet" href="../css/style.css">
   <style>
       .modal {
           display: none;
           position: fixed;
           z-index: 1000;
           left: 0;
           top: 0;
           width: 100%;
           height: 100%;
           background-color: rgba(0,0,0,0.4);
       }
       .modal-content {
           background-color: white;
           margin: 5% auto;
           padding: 2rem;
           border-radius: 0.5rem;
           width: 80%;
           max-width: 500px;
       }
       .close {
           color: #aaa;
           float: right;
           font-size: 28px;
           font-weight: bold;
           cursor: pointer;
       }
       .close:hover { color: #000; }
   </style>
</head>
<body>
   <nav class="navbar">
       <div class="container">
           <div class="navbar-content">
               <h1 style="color: var(--primary-color);">Quản lý phòng ban</h1>
               <div>
                   <a href="admin-dashboard.html" class="btn">Dashboard</a>
                   <a href="admin-users.html" class="btn">Người dùng</a>
                   <a href="admin-requests.html" class="btn">Khảo sát</a>
                   <button class="btn btn-danger" onclick="AUTH.logout()">Đăng xuất</button>
               </div>
           </div>
       </div>
   </nav>
   
   <div class="container">
       <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
           <h2>Danh sách phòng ban</h2>
           <button class="btn btn-primary" onclick="openCreateModal()">+ Thêm phòng ban</button>
       </div>
       
       <div id="departmentsList" class="card">
           <div class="loading">
               <div class="spinner"></div>
           </div>
       </div>
   </div>
   
   <!-- Create/Edit Department Modal -->
   <div id="departmentModal" class="modal">
       <div class="modal-content">
           <span class="close" onclick="closeModal()">&times;</span>
           <h2 id="modalTitle">Thêm phòng ban mới</h2>
           <form id="departmentForm">
               <input type="hidden" id="departmentId">
               <div class="form-group">
                   <label class="form-label">Tên phòng ban *</label>
                   <input type="text" id="departmentName" class="form-control" required>
               </div>
               <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                   <button type="submit" class="btn btn-primary">Lưu</button>
                   <button type="button" class="btn" onclick="closeModal()">Hủy</button>
               </div>
           </form>
       </div>
   </div>
   
   <script src="../js/config.js"></script>
   <script src="../js/api.js"></script>
   <script src="../js/auth.js"></script>
   <script>
       if (!AUTH.requireAuth() || !AUTH.isAdmin()) {
           window.location.href = 'login.html';
       }
       
       async function loadDepartments() {
           try {
               const response = await API.get('/departments');
               const container = document.getElementById('departmentsList');
               
               if (response.departments.length === 0) {
                   container.innerHTML = '<p>Chưa có phòng ban nào</p>';
               } else {
                   container.innerHTML = `
                       <table class="table">
                           <thead>
                               <tr>
                                   <th>ID</th>
                                   <th>Tên phòng ban</th>
                                   <th>Hành động</th>
                               </tr>
                           </thead>
                           <tbody>
                               ${response.departments.map(dept => `
                                   <tr>
                                       <td>${dept.id}</td>
                                       <td>${dept.name}</td>
                                       <td>
                                           <button class="btn btn-sm" onclick="editDepartment(${dept.id})">Sửa</button>
                                           <button class="btn btn-sm btn-danger" onclick="deleteDepartment(${dept.id})">Xóa</button>
                                       </td>
                                   </tr>
                               `).join('')}
                           </tbody>
                       </table>
                   `;
               }
           } catch (error) {
               console.error('Error loading departments:', error);
               document.getElementById('departmentsList').innerHTML = '<p class="alert alert-danger">Lỗi tải dữ liệu phòng ban</p>';
           }
       }
       
       function openCreateModal() {
           document.getElementById('modalTitle').textContent = 'Thêm phòng ban mới';
           document.getElementById('departmentForm').reset();
           document.getElementById('departmentId').value = '';
           document.getElementById('departmentModal').style.display = 'block';
       }
       
       async function editDepartment(id) {
           try {
               const response = await API.get(`/departments/${id}`);
               const dept = response.department;
               document.getElementById('modalTitle').textContent = 'Cập nhật phòng ban';
               document.getElementById('departmentId').value = id;
               document.getElementById('departmentName').value = dept.name;
               document.getElementById('departmentModal').style.display = 'block';
           } catch (error) {
               alert('Không thể tải thông tin phòng ban');
           }
       }
       
       function closeModal() {
           document.getElementById('departmentModal').style.display = 'none';
       }
       
       document.getElementById('departmentForm').addEventListener('submit', async (e) => {
           e.preventDefault();
           
           const id = document.getElementById('departmentId').value;
           const data = {
               name: document.getElementById('departmentName').value
           };
           
           try {
               if (id) {
                   await API.put(`/departments/${id}`, data);
                   alert('Cập nhật thành công!');
               } else {
                   await API.post('/departments', data);
                   alert('Thêm phòng ban thành công!');
               }
               closeModal();
               loadDepartments();
           } catch (error) {
               alert('Có lỗi xảy ra: ' + (error.message || 'Server error'));
           }
       });
       
       async function deleteDepartment(id) {
           if (confirm('Bạn có chắc muốn xóa phòng ban này? (Không thể xóa nếu có người dùng đang thuộc phòng ban)')) {
               try {
                   await API.delete(`/departments/${id}`);
                   alert('Xóa thành công!');
                   loadDepartments();
               } catch (error) {
                   alert('Không thể xóa phòng ban này. Có thể vẫn còn người dùng thuộc phòng ban.');
               }
           }
       }
       
       // Load initial data
       loadDepartments();
   </script>
</body>
</html>
