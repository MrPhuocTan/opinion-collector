<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Opinion Collector</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-header h1 { color: #4F46E5; margin-bottom: 0.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-control {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 0.5rem;
            font-size: 1rem;
        }
        .btn {
            width: 100%;
            padding: 0.75rem;
            background: #4F46E5;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 500;
        }
        .btn:hover { background: #4338CA; }
        .alert { padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem; }
        .alert-danger { background: #FEE2E2; color: #991B1B; }
        .alert-success { background: #D1FAE5; color: #065F46; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Opinion Collector</h1>
            <p>Hệ thống khảo sát ý kiến</p>
        </div>
        <div id="alertContainer"></div>
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Tên đăng nhập</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="form-label">Mật khẩu</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn">Đăng nhập</button>
        </form>
    </div>
    
    <script>
        const API_URL = 'http://localhost:3000/api/v1';
        
        function showAlert(message, type = 'danger') {
            document.getElementById('alertContainer').innerHTML = 
                `<div class="alert alert-${type}">${message}</div>`;
        }
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showAlert('Đăng nhập thành công!', 'success');
                    
                    setTimeout(() => {
                        window.location.href = data.user.role === 'ADMIN' 
                            ? 'admin-dashboard.html' 
                            : 'user-dashboard.html';
                    }, 1000);
                } else {
                    showAlert(data.error || 'Đăng nhập thất bại');
                }
            } catch (error) {
                showAlert('Không thể kết nối đến server');
            }
        });
    </script>
</body>
</html>
