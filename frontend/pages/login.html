<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Opinion Collector</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
</head>
<body class="auth-body">
    <div class="login-container">
        <div class="login-header">
            <h1>Opinion Collector</h1>
            <p>Hệ thống khảo sát ý kiến</p>
        </div>
        
        <div id="alertContainer"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="username">
                    <i class="fas fa-user"></i> Tên đăng nhập
                </label>
                <input 
                    type="text" 
                    id="username" 
                    class="form-control" 
                    placeholder="Nhập tên đăng nhập"
                    required
                >
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">
                    <i class="fas fa-lock"></i> Mật khẩu
                </label>
                <input 
                    type="password" 
                    id="password" 
                    class="form-control" 
                    placeholder="Nhập mật khẩu"
                    required
                >
            </div>
            
            <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Đăng nhập
            </button>
        </form>
        
        <div class="divider">
            <span>hoặc</span>
        </div>
        
        <div class="text-center">
            <a href="/pages/register.html" class="text-small">
                Chưa có tài khoản? Đăng ký ngay
            </a>
            <br>
            <a href="/pages/forgot-password.html" class="text-small">
                Quên mật khẩu?
            </a>
        </div>
    </div>
    
    <script>
        // Simple API configuration
        const API_URL = '/api/v1';
        
        // Show alert
        function showAlert(message, type = 'info') {
            const alertContainer = document.getElementById('alertContainer');
            const alertEl = document.createElement('div');
            alertEl.className = `alert alert-${type}`;
            alertEl.textContent = message;
            
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alertEl);
            
            setTimeout(() => {
                alertEl.remove();
            }, 5000);
        }
        
        // Show loading
        function showLoading() {
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner" style="width: 20px; height: 20px; border-width: 2px;"></div> Đang xử lý...';
        }
        
        // Hide loading
        function hideLoading() {
            const btn = document.getElementById('loginBtn');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Đăng nhập';
        }
        
        // Handle login form
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            showLoading();
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Store token and user info
                    localStorage.setItem('ocs_token', data.token);
                    localStorage.setItem('ocs_user', JSON.stringify(data.user));
                    
                    showAlert('Đăng nhập thành công!', 'success');
                    
                    // Redirect based on role
                    setTimeout(() => {
                        if (data.user.role === 'ADMIN') {
                            window.location.href = '/pages/admin-dashboard.html';
                        } else {
                            window.location.href = '/pages/user-dashboard.html';
                        }
                    }, 1000);
                } else {
                    hideLoading();
                    showAlert(data.error || 'Tên đăng nhập hoặc mật khẩu không đúng!', 'danger');
                }
            } catch (error) {
                hideLoading();
                showAlert('Không thể kết nối đến server. Vui lòng thử lại!', 'danger');
                console.error('Login error:', error);
            }
        });
        
        // Check if already logged in
        const token = localStorage.getItem('ocs_token');
        const user = localStorage.getItem('ocs_user');
        
        if (token && user) {
            const userData = JSON.parse(user);
            if (userData.role === 'ADMIN') {
                window.location.href = '/pages/admin-dashboard.html';
            } else {
                window.location.href = '/pages/user-dashboard.html';
            }
        }
    </script>
</body>
</html>
