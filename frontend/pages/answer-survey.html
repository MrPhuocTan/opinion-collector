                <div class="navbar-menu">
                    <span class="navbar-user">
                        <i class="fas fa-user-circle"></i>
                        <span id="userName">User</span>

    <div class="container">
        <div class="card">
            <div class="card-body">
                <h1 id="requestName" class="card-title">Loading...</h1>
                <p id="requestDescription" class="text-muted"></p>
                <div class="progress-container">
                    <div class="d-flex justify-between align-center mb-1">
                        <span>Tiến độ hoàn thành</span>
                        <span id="progressText">0/0</span>
                    </div>
                    <div class="progress">
                        <div id="progressBar" class="progress-bar" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="questionsContainer"></div>
        
        <div class="submit-container">
            <button id="submitBtn" class="btn btn-primary btn-lg" onclick="submitAnswers()">
                <i class="fas fa-paper-plane"></i> Gửi khảo sát
            </button>
        </div>
    </div>
    
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/answer-dynamic.js"></script>
    <script>
        let currentRequest = null;
        let questions = [];
        let isLocked = false;
        
        if (!AUTH.requireAuth()) {
            // Redirect handled by requireAuth
        } else {
            const requestId = getUrlParam('id');
            if (!requestId) {
                alert('Không tìm thấy khảo sát');
                window.location.href = '/pages/user-dashboard.html';
            } else {
                loadSurvey(requestId);
            }
        }
        
        function calculateProgress(answered, total) {
            if (total === 0) return 0;
            return Math.round((answered / total) * 100);
        }
        
        async function loadSurvey(requestId) {
            const user = AUTH.getCurrentUser();
            document.getElementById('userName').textContent = user.userInfo || user.username;
            
            try {
                showLoading(document.getElementById('questionsContainer'));
                const requestResponse = await API.get(CONFIG.ENDPOINTS.REQUEST_BY_ID(requestId));
                currentRequest = requestResponse.request;
                const questionsResponse = await API.get(CONFIG.ENDPOINTS.QUESTIONS_BY_REQUEST(requestId));
                const answersResponse = await API.get(CONFIG.ENDPOINTS.USER_ANSWERS(requestId));
                hideLoading(document.getElementById('questionsContainer'));
                
                document.getElementById('requestName').textContent = currentRequest.reqName;
                document.getElementById('requestDescription').innerHTML = renderRichText(currentRequest.reqDes || '');
                
                if (answersResponse.answers && answersResponse.answers.length > 0) {
                    answerManager.loadExistingAnswers(
                        answersResponse.answers,
                        answersResponse.opinionCounts || {}
                    );
                }
                
                displayQuestions(questionsResponse.documents, answersResponse.answers);
                updateProgress();
                
                if (currentRequest && currentRequest.isLocked) {
                    lockSurvey();
                }
            } catch (error) {
                hideLoading(document.getElementById('questionsContainer'));
                document.getElementById('questionsContainer').innerHTML = '<div class="alert alert-danger">Không thể tải khảo sát. Vui lòng thử lại.</div>';
                console.error('Load survey error:', error);
            }
        }
        
        function lockSurvey() {
            isLocked = true;
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert alert-warning';
            alertDiv.innerHTML = '<i class="fas fa-lock"></i> <strong>Khảo sát này đã bị khóa.</strong> Bạn chỉ có thể xem, không thể thay đổi câu trả lời.';
            const container = document.querySelector('.container');
            container.insertBefore(alertDiv, container.firstChild);
            
            document.querySelectorAll('input, textarea, button').forEach(el => {
                el.disabled = true;
                el.style.opacity = '0.6';
                el.style.cursor = 'not-allowed';
            });
            
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').style.opacity = '0.5';
            document.getElementById('submitBtn').innerHTML = '<i class="fas fa-lock"></i> Đợt lấy ý kiến đã khóa';
        }
        
        function displayQuestions(documents, existingAnswers) {
            const container = document.getElementById('questionsContainer');
            questions = [];
            if (!documents || documents.length === 0) {
                container.innerHTML = '<p class="text-muted">Không có câu hỏi nào</p>';
                return;
            }
            
            let questionIndex = 0;
            container.innerHTML = documents.map((doc, docIndex) => {
                return `<div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <i class="fas fa-file-pdf text-danger"></i> ${renderRichText(doc.docDes)}
                        </div>
                        <p class="text-small text-muted mb-0">Số hiệu: ${doc.docNum || 'N/A'}</p>
                        ${doc.pdfUrl ? `<a href="${buildPdfUrl(doc.pdfUrl)}" target="_blank" class="btn btn-sm btn-outline mt-2">
                            <i class="fas fa-download"></i> Xem văn bản
                        </a>` : ''}
                    </div>
                    <div class="card-body">
                        ${doc.questions.map((q, qIndex) => {
                            questionIndex++;
                            questions.push(q);
                            const questionAnswers = existingAnswers?.find(ea => ea.queId === q.queId);
                            return createQuestionHTML(q, questionIndex, questionAnswers);
                        }).join('')}
                    </div>
                </div>`;
            }).join('');
            
            setTimeout(() => {
                questions.forEach(q => {
                    const questionAnswers = existingAnswers?.find(ea => ea.queId === q.queId);
                    answerManager.initQuestion(q.queId, q.queType, questionAnswers ? questionAnswers.answers : []);
                });
            }, 100);
        }
        
        function createQuestionHTML(question, index, existingAnswers) {
            let html = `<div class="question-item" data-question-id="${question.queId}" data-question-type="${question.queType}">
                <div class="question-header">
                    <div style="flex: 1">
                        <div class="form-label" style="white-space: pre-wrap;">
                            ${renderRichText(question.queDes)}
                            ${question.quesAns ? `<div class="text-small text-muted">(Gợi ý: ${escapeHtml(question.quesAns)})</div>` : ''}
                        </div>`;
            
            if (question.queType === 'BOOLEAN') {
                const existingAnswer = existingAnswers?.answers?.find(a => a.ans_user) || {};
                const opinionCount = existingAnswers?.answers?.length - 1 || 0;

                html += `
                    <div class="answers-section">
                        <div class="answers-row" style="display: flex; gap: 1rem; align-items: flex-start;">
                            
                            <!-- Ô nhập số lượng thống nhất -->
                            <div class="answers-col" style="flex: 1;">
                                <label class="form-label">Số lượng thống nhất</label>
                                <input type="text" 
                                    id="answer_text_${question.queId}" 
                                    name="q_${question.queId}" 
                                    data-question-id="${question.queId}" 
                                    value="${existingAnswer.ans_user || ''}" 
                                    placeholder="Nhập số lượng thống nhất...">
                            </div>

                            <!-- Ô nhập số lượng ý kiến khác -->
                            <div class="answers-col" style="flex: 1;">
                                <label class="form-label">Số lượng ý kiến khác</label>
                                <input type="number" 
                                    id="opinion_count_${question.queId}" 
                                    min="${opinionCount}" 
                                    value="${opinionCount}" 
                                    onchange="answerManager.updateOpinionCount(${question.queId}, parseInt(this.value))"
                                    placeholder="Nhập số lượng ý kiến khác...">
                            </div>
                        </div>

                        <!-- Container chứa các textbox bổ sung -->
                        <div id="answers_container_${question.queId}" style="margin-top: 1rem;"></div>
                    </div>`;
            } else if (question.queType === 'TEXT') {
                // SỬA: TEXT chỉ có 1 textarea duy nhất
                const existingText = existingAnswers?.answers?.[0]?.ans_user || '';
                html += `
                    <div class="answers-section mt-2">
                        <label class="form-label text-small">Nội dung ý kiến:</label>
                        <textarea 
                            id="answer_text_${question.queId}"
                            class="form-control"
                            rows="3"
                            placeholder="Nhập ý kiến của bạn..."
                            data-question-id="${question.queId}"
                            onchange="answerManager.updateTextAnswer(${question.queId}, this.value)"
                        >${existingText}</textarea>
                    </div>
                `;
            } else if (question.queType === 'NUMBER') {
                html += `<div class="answers-section mt-2">
                    <label class="form-label text-small">Giá trị cần tổng hợp:</label>
                    <div id="answers_container_${question.queId}"></div>
                </div>`;
            }
            
            html += `</div>
                <div class="question-counter" id="counter_${question.queId}"></div>
            </div></div>`;
            return html;
        }
        
        function updateProgress() {
            const allAnswers = answerManager.collectAllAnswers();
            const answered = allAnswers.length;
            const total = questions.length;
            const percentage = calculateProgress(answered, total);
            
            document.getElementById('progressText').textContent = `${answered}/${total}`;
            document.getElementById('progressBar').style.width = `${percentage}%`;
            document.getElementById('progressBar').textContent = `${percentage}%`;
        }
        
        async function saveDraft() {
            if (isLocked) {
                showAlert('Khảo sát đã bị khóa. Không thể lưu nháp.', 'warning');
                return;
            }
            const collectedAnswers = answerManager.collectAllAnswers();
            if (collectedAnswers.length === 0) {
                showAlert('Chưa có câu trả lời nào để lưu', 'warning');
                return;
            }
            showAlert('Đang lưu nháp...', 'info');
            localStorage.setItem(`draft_${currentRequest.reqId}`, JSON.stringify(collectedAnswers));
            showAlert('Đã lưu nháp thành công!', 'success');
        }
        
        async function submitAnswers() {
            if (isLocked) {
                showAlert('Khảo sát đã bị khóa. Không thể gửi câu trả lời.', 'warning');
                return;
            }
            const collectedAnswers = answerManager.collectAllAnswers();
            if (collectedAnswers.length === 0) {
                showAlert('Vui lòng trả lời ít nhất một câu hỏi', 'warning');
                return;
            }
            if (collectedAnswers.length < questions.length) {
                if (!confirm(`Bạn mới trả lời ${collectedAnswers.length}/${questions.length} câu hỏi. Bạn có muốn gửi không?`)) {
                    return;
                }
                // showAlert('Vui lòng Hoàn Thiện Khảo Sát', 'warning');
                return;
            }
            try {
                document.getElementById('submitBtn').disabled = true;
                showLoading(document.querySelector('.submit-container'));
                const response = await API.post(CONFIG.ENDPOINTS.SUBMIT_MULTIPLE_ANSWERS, {
                    answers: collectedAnswers
                });
                hideLoading(document.querySelector('.submit-container'));
                localStorage.removeItem(`draft_${currentRequest.reqId}`);
                showAlert('Đã ghi nhận phiếu ý kiến thành công.', 'success');
                setTimeout(() => {
                    window.location.href = '/pages/user-dashboard.html';
                }, 2000);
            } catch (error) {
                hideLoading(document.querySelector('.submit-container'));
                document.getElementById('submitBtn').disabled = false;
                if (error.message && error.message.includes('locked')) {
                    showAlert('Khảo sát đã bị khóa. Không thể gửi câu trả lời.', 'warning');
                    setTimeout(() => {
                        location.reload();
                    }, 2000);
                } else {
                    showAlert('Không thể ghi nhận phiếu ý kiến. Vui lòng thử lại!', 'danger');
                }
                console.error(error);
            }
        }
        
        setInterval(() => {
            if (questions.length > 0 && !isLocked) {
                const collectedAnswers = answerManager.collectAllAnswers();
                if (collectedAnswers.length > 0) {
                    localStorage.setItem(`draft_${currentRequest.reqId}`, JSON.stringify(collectedAnswers));
                    console.log('Auto-saved draft');
                }
            }
        }, 30000);
        
        document.addEventListener('change', (e) => {
            if (e.target.matches('input[type="radio"], input[type="text"], textarea, input[type="number"]')) {
                updateProgress();
            }
        });
    </script>
