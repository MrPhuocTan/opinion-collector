    <div class="main-content">
        <h1 class="page-title">Danh sách khảo sát</h1>

    <!-- Change Password Modal -->
    <div id="changePasswordModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 8px; width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h3 style="margin-top: 0; color: #B22222;">Đổi mật khẩu</h3>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">Mật khẩu cũ:</label>
                <input type="password" id="oldPassword" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">Mật khẩu mới:</label>
                <input type="password" id="newPassword" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">Xác nhận mật khẩu mới:</label>
                <input type="password" id="confirmPassword" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            
            <div id="passwordError" style="color: red; margin-bottom: 15px; display: none;"></div>
            
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button onclick="closePasswordModal()" style="padding: 8px 20px; background: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer;">Hủy</button>
                <button onclick="savePassword()" style="padding: 8px 20px; background: #B22222; color: white; border: none; border-radius: 4px; cursor: pointer;">Lưu mật khẩu</button>
            </div>
        </div>
    </div>
    
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        // Hàm cập nhật ngày giờ
        function updateDateTime() {
            const now = new Date();
            const optionsDate = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const optionsTime = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            
            document.getElementById('currentDate').textContent = now.toLocaleDateString('vi-VN', optionsDate);
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('vi-VN', optionsTime);
        }

        // Cập nhật ngày giờ ngay khi tải trang và mỗi giây
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // Check authentication
        if (!AUTH.requireAuth()) {
            // Redirect handled by requireAuth
        } else {
            loadUserDashboard();
        }
        
        async function loadUserDashboard() {
            // Display user info
            const user = AUTH.getCurrentUser();
            document.getElementById('userName').textContent = user.userInfo || user.username;
            
            try {
                const response = await API.get(CONFIG.ENDPOINTS.REQUESTS);
                const requests = response.requests;
                
                displayRequests(requests);
                
            } catch (error) {
                const container = document.getElementById('requestsList');
                container.innerHTML = `<div class="empty-state">
                                        <i class="fas fa-exclamation-triangle fa-3x"></i>
                                        <p class="mt-2">Không thể tải danh sách khảo sát. Vui lòng thử lại sau.</p>
                                    </div>`;
                showAlert('Không thể tải danh sách khảo sát', 'danger');
            }
        }
        
        function displayRequests(requests) {
            const container = document.getElementById('requestsList');
            
            if (!requests || requests.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox fa-3x text-light"></i>
                        <p class="text-light mt-2">Hiện tại không có khảo sát nào được giao cho bạn.</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = requests.map(request => `
                <div class="card request-card">
                    <h3 class="card-title">${escapeHtml(request.reqName)}</h3>
                    <p class="text-muted">${escapeHtml(stripHtml(request.reqDes || '') || 'Chưa cập nhật nội dung trình bày')}</p>
                    <div style="margin-bottom: 1rem;">
                        ${(request.audience_groups || []).length ? request.audience_groups.map(group => `
                            <span class="badge" style="background:#fff4db; color:#8a4b00; margin-right:0.35rem;">
                                <i class="fas fa-people-group"></i> ${escapeHtml(group.groupName)}
                            </span>
                        `).join('') : '<span class="badge" style="background:#ecfdf5; color:#166534;"><i class="fas fa-building-columns"></i> Toàn bộ đơn vị</span>'}
                    </div>
                    
                    <div class="request-meta">
                        <span class="badge">
                            <i class="fas fa-file-alt"></i> ${request.documentCount} văn kiện
                        </span>
                        <span class="text-small text-muted">
                            <i class="fas fa-calendar"></i> ${formatDateShort(request.reqDate)}
                        </span>
                    </div>
                    
                    <div class="mt-4 d-flex" style="gap: 1rem;">
                        <button class="btn btn-primary" onclick="viewRequest(${request.reqId})">
                            <i class="fas fa-clipboard-check"></i> Làm khảo sát
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        function viewRequest(requestId) {
            window.location.href = `answer-survey.html?id=${requestId}`;
        }
        
        async function checkProgress(requestId) {
            try {
                const response = await API.get(CONFIG.ENDPOINTS.USER_PROGRESS(requestId));
                const progress = response.progress;
                
                showAlert(
                    `Tiến độ: ${progress.answered}/${progress.total} câu hỏi (${progress.percentage}%)`,
                    progress.percentage === 100 ? 'success' : 'info'
                );
            } catch (error) {
                showAlert('Không thể tải tiến độ', 'danger');
            }
        }
        
        // Helper function for showing/hiding loading state
        function showLoading(element) {
            element.innerHTML = `<div class="spinner-container"><div class="spinner"></div></div>`;
        }
        
        function hideLoading(element) {
            // No need to clear, as displayRequests will overwrite
        }
        function openPasswordModal() {
    document.getElementById('changePasswordModal').style.display = 'block';
    document.getElementById('oldPassword').value = '';
    document.getElementById('newPassword').value = '';
    document.getElementById('confirmPassword').value = '';
    document.getElementById('passwordError').style.display = 'none';
}

    function closePasswordModal() {
        document.getElementById('changePasswordModal').style.display = 'none';
    }

    async function savePassword() {
        const oldPassword = document.getElementById('oldPassword').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const errorDiv = document.getElementById('passwordError');
        
        // Validation
        if (!oldPassword || !newPassword || !confirmPassword) {
            errorDiv.textContent = 'Vui lòng điền đầy đủ thông tin';
            errorDiv.style.display = 'block';
            return;
        }
        
        if (newPassword !== confirmPassword) {
            errorDiv.textContent = 'Mật khẩu mới không khớp';
            errorDiv.style.display = 'block';
            return;
        }
        
        if (newPassword.length < 6) {
            errorDiv.textContent = 'Mật khẩu mới phải có ít nhất 6 ký tự';
            errorDiv.style.display = 'block';
            return;
        }
        
        try {
            const response = await API.put('/users/change-password', {
                oldPassword,
                newPassword
            });
            
            alert('Đổi mật khẩu thành công!');
            closePasswordModal();
        } catch (error) {
            errorDiv.textContent = error.message || 'Có lỗi xảy ra. Vui lòng thử lại.';
            errorDiv.style.display = 'block';
        }
    }

    // Close modal when clicking outside
    window.onclick = function(event) {
        const modal = document.getElementById('changePasswordModal');
        if (event.target == modal) {
            closePasswordModal();
        }
    }
    </script>
