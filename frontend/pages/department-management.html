    <div class="main-content">
        <section id="departments-section" class="content-section">
            <div class="section-header">
                <h1>Quản lý Ban, Phòng, Đơn vị</h1>
                <button class="btn btn-primary" onclick="showAddModal()">
                    <i class="fas fa-plus-circle"></i> Thêm mới
                </button>
            </div>
            
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Tên phòng ban</th>
                            <th>Tổng nhân viên</th>
                            <th>Đang hoạt động</th>
                            <th>Ngày tạo</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="departmentsTableBody">
                        <tr>
                            <td colspan="5" class="text-center">
                                <div class="spinner"></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    <div id="departmentModal" class="modal">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h2 id="modalTitle">Thêm phòng ban</h2>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <form id="departmentForm" style="padding: 1.5rem 2rem;">
                <input type="hidden" id="departId">
                <div class="form-group">
                    <label class="form-label">Tên phòng ban *</label>
                    <input type="text" id="name" class="form-control" required>
                </div>
                <div class="modal-footer" style="padding: 0; border: none; justify-content: flex-end; gap: 1rem; margin-top: 1rem;">
                    <button type="submit" class="btn btn-primary">Lưu</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Hủy</button>
                </div>
            </form>
        </div>
    </div>

    <div id="usersModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="usersModalTitle">Danh sách nhân viên</h2>
                <span class="modal-close" onclick="closeUsersModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div id="usersList"></div>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        let currentEditId = null;

        // Cập nhật ngày giờ
        function updateDateTime() {
            const now = new Date();
            const optionsDate = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const optionsTime = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            
            document.getElementById('currentDate').textContent = now.toLocaleDateString('vi-VN', optionsDate);
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('vi-VN', optionsTime);
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // Check admin auth
        if (!AUTH.requireAuth() || !AUTH.requireAdmin()) {
            window.location.href = '/pages/login.html';
        } else {
            const user = AUTH.getCurrentUser();
            document.getElementById('adminName').textContent = user.userInfo || user.username || 'Người dùng';
        }

        // Load departments on init
        loadDepartments();

        // Load departments
        async function loadDepartments() {
            try {
                const response = await API.get('/departments?stats=true');
                displayDepartments(response.departments);
            } catch (error) {
                console.error('Load departments error:', error);
                showAlert('Không thể tải danh sách phòng ban', 'danger');
            }
        }

        // Display departments
        function displayDepartments(departments) {
            const tbody = document.getElementById('departmentsTableBody');
            
            if (!departments || departments.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center">Không có dữ liệu</td></tr>';
                return;
            }
            
            tbody.innerHTML = departments.map(dept => `
                <tr>
                    <td>${dept.name}</td>
                    <td>${dept.total_users || 0}</td>
                    <td>${dept.active_users || 0}</td>
                    <td>${formatDateShort(dept.created_at)}</td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="editDepartment(${dept.departmentId}, '${dept.name}')">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-sm btn-info" onclick="viewUsers(${dept.departmentId}, '${dept.name}')">
                            <i class="fas fa-users"></i>
                        </button>
                        ${dept.total_users == 0 
                            ? `<button class="btn btn-sm btn-danger" onclick="deleteDepartment(${dept.departmentId})">
                                <i class="fas fa-trash"></i>
                               </button>`
                            : `<button class="btn btn-sm btn-danger" disabled title="Không thể xóa phòng ban có nhân viên">
                                <i class="fas fa-trash"></i>
                               </button>`
                        }
                    </td>
                </tr>
            `).join('');
        }

        // Show add modal
        function showAddModal() {
            currentEditId = null;
            document.getElementById('modalTitle').textContent = 'Thêm phòng ban';
            document.getElementById('departmentForm').reset();
            document.getElementById('departmentModal').style.display = 'block';
        }

        // Edit department
        function editDepartment(id, name) {
            currentEditId = id;
            document.getElementById('modalTitle').textContent = 'Cập nhật phòng ban';
            document.getElementById('departId').value = id;
            document.getElementById('name').value = name;
            document.getElementById('departmentModal').style.display = 'block';
        }

        // Close modal
        function closeModal() {
            document.getElementById('departmentModal').style.display = 'none';
        }

        // Handle form submit
        document.getElementById('departmentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            
            try {
                if (currentEditId) {
                    await API.put(`/departments/${currentEditId}`, { name });
                    showAlert('Cập nhật phòng ban thành công', 'success');
                } else {
                    await API.post('/departments', { name });
                    showAlert('Thêm phòng ban thành công', 'success');
                }
                closeModal();
                loadDepartments();
            } catch (error) {
                showAlert(error.message || 'Có lỗi xảy ra', 'danger');
            }
        });

        // Delete department
        async function deleteDepartment(id) {
            if (!confirm('Bạn có chắc muốn xóa phòng ban này?')) {
                return;
            }
            
            try {
                await API.delete(`/departments/${id}`);
                showAlert('Xóa phòng ban thành công', 'success');
                loadDepartments();
            } catch (error) {
                showAlert(error.message || 'Không thể xóa phòng ban', 'danger');
            }
        }

        // View users in department
        async function viewUsers(departId, departName) {
            try {
                const response = await API.get(`/departments/${departId}/users`);
                document.getElementById('usersModalTitle').textContent = `Nhân viên - ${departName}`;
                
                const usersList = document.getElementById('usersList');
                if (!response.users || response.users.length === 0) {
                    usersList.innerHTML = '<p>Không có nhân viên trong phòng ban này</p>';
                } else {
                    usersList.innerHTML = `
                        <div class="table-responsive">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Username</th>
                                        <th>Họ tên</th>
                                        <th>Vai trò</th>
                                        <th>Trạng thái</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${response.users.map(user => `
                                        <tr>
                                            <td>${user.username}</td>
                                            <td>${user.userInfo || '-'}</td>
                                            <td>${user.role}</td>
                                            <td>
                                                <span class="badge badge-${user.is_active ? 'success' : 'danger'}">
                                                    ${user.is_active ? 'Đang hoạt động' : 'Đã khóa'}
                                                </span>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                }
                
                document.getElementById('usersModal').style.display = 'block';
            } catch (error) {
                showAlert('Không thể tải danh sách nhân viên', 'danger');
            }
        }

        function closeUsersModal() {
            document.getElementById('usersModal').style.display = 'none';
        }
    </script>
