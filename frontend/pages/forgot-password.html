<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - Hệ thống Thu thập ý kiến</title>
    
    <link rel="stylesheet" href="../css/style.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    
</head>
<body class="auth-body">
    <div class="forgot-container">
        <div class="forgot-header">
            <h1>QUÊN MẬT KHẨU</h1>
            <p>Khôi phục mật khẩu qua số điện thoại</p>
        </div>
        
        <div id="alertContainer"></div>
        
        <div id="step1" class="step active">
            <form id="phoneForm">
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-phone"></i> Số điện thoại đã đăng ký
                    </label>
                    <input 
                        type="tel" 
                        id="phone" 
                        class="form-control" 
                        placeholder="Nhập số điện thoại"
                        required
                        pattern="(0|\+84)[3-9][0-9]{8}"
                    >
                </div>
                
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-paper-plane"></i> Gửi mã OTP
                </button>
            </form>
        </div>
        
        <div id="step2" class="step">
            <form id="otpForm">
                <div class="form-group">
                    <label class="form-label text-center" style="display: block;">
                        Nhập mã OTP đã gửi đến số <strong id="phoneDisplay"></strong>
                    </label>
                    <div class="otp-inputs">
                        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]">
                        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]">
                        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]">
                        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]">
                        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]">
                        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]">
                    </div>
                    <div class="countdown text-center" id="countdown"></div>
                </div>
                
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-check"></i> Xác nhận OTP
                </button>
            </form>
        </div>
        
        <div id="step3" class="step">
            <form id="passwordForm">
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-lock"></i> Mật khẩu mới
                    </label>
                    <input 
                        type="password" 
                        id="newPassword" 
                        class="form-control" 
                        placeholder="Tối thiểu 6 ký tự"
                        required
                        minlength="6"
                    >
                </div>
                
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-lock"></i> Xác nhận mật khẩu mới
                    </label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        class="form-control" 
                        placeholder="Nhập lại mật khẩu"
                        required
                    >
                </div>
                
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Đổi mật khẩu
                </button>
            </form>
        </div>
        
        <div class="text-center" style="margin-top: 1.5rem;">
            <a href="login.html" class="text-small">
                <i class="fas fa-arrow-left"></i> Quay lại đăng nhập
            </a>
        </div>
    </div>
    
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        const API_URL = CONFIG.API_URL;
        let currentPhone = '';
        let currentOTP = '';
        let countdownTimer = null;
        
        // Show alert
        function showAlert(message, type = 'info') {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    ${message}
                </div>
            `;
        }
        
        // Show step
        function showStep(stepNumber) {
            document.querySelectorAll('.step').forEach(step => {
                step.classList.remove('active');
            });
            document.getElementById(`step${stepNumber}`).classList.add('active');
        }
        
        // OTP input handling
        document.querySelectorAll('.otp-input').forEach((input, index, inputs) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
        
        // Start countdown
        function startCountdown() {
            let seconds = 300; // 5 minutes
            
            countdownTimer = setInterval(() => {
                const minutes = Math.floor(seconds / 60);
                const secs = seconds % 60;
                document.getElementById('countdown').textContent = 
                    `Mã OTP hết hạn sau: ${minutes}:${secs.toString().padStart(2, '0')}`;
                
                seconds--;
                
                if (seconds < 0) {
                    clearInterval(countdownTimer);
                    document.getElementById('countdown').textContent = 'Mã OTP đã hết hạn';
                    showAlert('Mã OTP đã hết hạn. Vui lòng thử lại.', 'danger');
                    showStep(1);
                }
            }, 1000);
        }
        
        // Step 1: Request OTP
        document.getElementById('phoneForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            currentPhone = document.getElementById('phone').value;
            
            try {
                const response = await fetch(`${API_URL}/auth/request-otp`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ phone: currentPhone })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // In development, show OTP
                    if (data.otp) {
                        showAlert(`OTP của bạn là: ${data.otp} (Dev mode)`, 'info');
                    } else {
                        showAlert('Mã OTP đã được gửi đến số điện thoại của bạn', 'success');
                    }
                    
                    document.getElementById('phoneDisplay').textContent = currentPhone;
                    showStep(2);
                    startCountdown();
                } else {
                    showAlert(data.error || 'Không thể gửi OTP', 'danger');
                }
            } catch (error) {
                showAlert('Lỗi kết nối server', 'danger');
                console.error(error);
            }
        });
        
        // Step 2: Verify OTP
        document.getElementById('otpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Collect OTP from inputs
            const otpInputs = document.querySelectorAll('.otp-input');
            currentOTP = Array.from(otpInputs).map(input => input.value).join('');
            
            if (currentOTP.length !== 6) {
                showAlert('Vui lòng nhập đủ 6 số OTP', 'danger');
                return;
            }
            
            // Move to step 3 (in real app, would verify OTP first)
            clearInterval(countdownTimer);
            showStep(3);
            showAlert('OTP hợp lệ. Vui lòng nhập mật khẩu mới.', 'success');
        });
        
        // Step 3: Reset Password
        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (newPassword !== confirmPassword) {
                showAlert('Mật khẩu không khớp', 'danger');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        phone: currentPhone,
                        otp: currentOTP,
                        newPassword: newPassword
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('Đổi mật khẩu thành công! Đang chuyển hướng...', 'success');
                   setTimeout(() => {
                       window.location.href = 'login.html';
                   }, 2000);
               } else {
                   showAlert(data.error || 'Không thể đổi mật khẩu', 'danger');
               }
           } catch (error) {
               showAlert('Lỗi kết nối server', 'danger');
               console.error(error);
           }
       });
   </script>
</body>
</html>
