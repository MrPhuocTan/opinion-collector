    <div class="main-content">
        <section class="content-card">
            <div class="section-header">
                <div>
                    <h1 class="section-title">Nhóm đối tượng lấy ý kiến</h1>
                    <p style="margin:0.5rem 0 0; color:#64748b;">Khai báo các nhóm đối tượng để phân luồng đợt lấy ý kiến theo đơn vị chuyên trách.</p>
                </div>
                <button class="btn btn-primary" onclick="openGroupModal()">
                    <i class="fas fa-plus"></i> Tạo nhóm
                </button>
            </div>
            <div id="groupsTableContainer"></div>
        </section>
    </div>

    <div class="modal" id="groupModalBackdrop">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Thiết lập nhóm đối tượng</h2>
                <button type="button" class="modal-close" onclick="closeGroupModal()">&times;</button>
            </div>
            <div class="modal-body">
            <form id="groupForm">
                <input type="hidden" id="groupId">
                <div class="form-group">
                    <label class="form-label">Tên nhóm đối tượng</label>
                    <input id="groupName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Mô tả nghiệp vụ</label>
                    <textarea id="groupDescription" class="form-control" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Đơn vị áp dụng</label>
                    <div id="departmentOptions" class="department-grid"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeGroupModal()">Đóng</button>
                    <button type="submit" class="btn btn-primary">Lưu cấu hình</button>
                </div>
            </form>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        let groups = [];
        let departments = [];

        if (!AUTH.requireAuth() || !AUTH.requireAdmin()) {
            // Redirect handled by auth helper
        } else {
            initialize();
        }

        async function initialize() {
            await Promise.all([loadDepartments(), loadGroups()]);
        }

        async function loadDepartments() {
            const response = await API.get('/departments');
            departments = response.departments || [];
            renderDepartmentOptions();
        }

        async function loadGroups() {
            try {
                const response = await API.get('/groups');
                groups = response.groups || [];
                renderGroups();
            } catch (error) {
                console.error(error);
                showAlert('Không thể tải danh mục nhóm đối tượng.', 'danger');
            }
        }

        function renderDepartmentOptions(selectedIds = []) {
            const selectedSet = new Set((selectedIds || []).map(Number));
            const container = document.getElementById('departmentOptions');

            container.innerHTML = departments.map((department) => `
                <label class="department-option">
                    <input type="checkbox" value="${department.departmentId}" ${selectedSet.has(Number(department.departmentId)) ? 'checked' : ''}>
                    <span>${escapeHtml(department.name)}</span>
                </label>
            `).join('');
        }

        function renderGroups() {
            const container = document.getElementById('groupsTableContainer');

            if (!groups.length) {
                container.innerHTML = '<p style="color:#64748b;">Chưa có nhóm đối tượng nào được thiết lập.</p>';
                return;
            }

            container.innerHTML = `
                <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Tên nhóm</th>
                            <th>Mô tả</th>
                            <th>Đơn vị áp dụng</th>
                            <th>Số đợt đang dùng</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${groups.map((group) => `
                            <tr>
                                <td><strong>${escapeHtml(group.groupName)}</strong></td>
                                <td>${escapeHtml(group.groupDescription || 'Chưa cập nhật')}</td>
                                <td>
                                    ${(group.departments || []).map((department) => `
                                        <span class="badge badge-primary">${escapeHtml(department.name)}</span>
                                    `).join(' ')}
                                </td>
                                <td>${group.request_count || 0}</td>
                                <td>
                                    <div class="table-actions">
                                    <button class="btn btn-sm btn-secondary" onclick="editGroup(${group.groupId})">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button class="btn btn-sm btn-danger" onclick="deleteGroup(${group.groupId})">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                </div>
            `;
        }

        function openGroupModal() {
            document.getElementById('groupForm').reset();
            document.getElementById('groupId').value = '';
            renderDepartmentOptions();
            document.getElementById('groupModalBackdrop').style.display = 'block';
        }

        function closeGroupModal() {
            document.getElementById('groupModalBackdrop').style.display = 'none';
        }

        function getSelectedDepartmentIds() {
            return Array.from(document.querySelectorAll('#departmentOptions input[type="checkbox"]:checked'))
                .map((checkbox) => Number(checkbox.value));
        }

        function editGroup(groupId) {
            const group = groups.find((item) => Number(item.groupId) === Number(groupId));
            if (!group) return;

            document.getElementById('groupId').value = group.groupId;
            document.getElementById('groupName').value = group.groupName || '';
            document.getElementById('groupDescription').value = group.groupDescription || '';
            renderDepartmentOptions((group.departments || []).map((department) => department.departmentId));
            document.getElementById('groupModalBackdrop').style.display = 'block';
        }

        async function deleteGroup(groupId) {
            if (!confirm('Bạn có chắc chắn muốn ngừng sử dụng nhóm đối tượng này?')) {
                return;
            }

            try {
                await API.delete(`/groups/${groupId}`);
                showAlert('Đã ngừng sử dụng nhóm đối tượng.', 'success');
                await loadGroups();
            } catch (error) {
                showAlert(error.message || 'Không thể ngừng sử dụng nhóm đối tượng.', 'danger');
            }
        }

        document.getElementById('groupForm').addEventListener('submit', async (event) => {
            event.preventDefault();

            const payload = {
                groupName: document.getElementById('groupName').value.trim(),
                groupDescription: document.getElementById('groupDescription').value.trim(),
                department_ids: getSelectedDepartmentIds()
            };

            const groupId = document.getElementById('groupId').value;

            try {
                if (groupId) {
                    await API.put(`/groups/${groupId}`, payload);
                    showAlert('Đã cập nhật nhóm đối tượng.', 'success');
                } else {
                    await API.post('/groups', payload);
                    showAlert('Đã tạo nhóm đối tượng.', 'success');
                }

                closeGroupModal();
                await loadGroups();
            } catch (error) {
                showAlert(error.message || 'Không thể lưu cấu hình nhóm đối tượng.', 'danger');
            }
        });
    </script>
