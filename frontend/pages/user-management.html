        <div class="sidebar-footer">
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span id="adminName">Loading...</span>
            </div>
            <div class="datetime-info">
                <i class="fas fa-calendar-alt"></i> <span id="currentDate">--/--/----</span><br>
                <i class="fas fa-clock"></i> <span id="currentTime">--:--:--</span>
            </div>

                <i class="fas fa-sign-out-alt"></i> Đăng xuất
            </button>
        </div>

    <div class="main-content">
        <section id="user-management-section" class="content-section active">
            <div class="section-header">
                <h1>QUẢN LÝ CÁN BỘ CÔNG VỤ</h1>
                <div class="header-actions-group">
                    <a href="/pages/admin-dashboard.html" class="btn btn-outline-primary">
                        <i class="fas fa-arrow-left"></i> Quay lại
                    </a>
                    <button class="btn btn-primary-icon" onclick="showAddUserModal()">
                        <i class="fas fa-plus"></i> Thêm người dùng
                    </button>
                </div>
            </div>

            <div class="filter-card">
                <div class="filter-group">
                    <label for="filterDepartment">Phòng ban</label>
                    <select id="filterDepartment" class="form-control" onchange="loadUsers()">
                        <option value="">Tất cả</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="filterStatus">Trạng thái</label>
                    <select id="filterStatus" class="form-control" onchange="loadUsers()">
                        <option value="">Tất cả</option>
                        <option value="active">Đang hoạt động</option>
                        <option value="inactive">Ngưng hoạt động</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="filterRole">Vai trò</label>
                    <select id="filterRole" class="form-control" onchange="loadUsers()">
                        <option value="">Tất cả</option>
                        <option value="ADMIN">Admin</option>
                        <option value="USER">User</option>
                    </select>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Họ tên</th>
                            <th>Phòng ban</th>
                            <th>Vai trò</th>
                            <th>SĐT</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr>
                            <td colspan="7" class="text-center">
                                <div class="spinner"></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Thêm người dùng</h2>
                <span class="modal-close" onclick="closeModal('userModal')">&times;</span>
            </div>
            <form id="userForm" class="modal-form">
                <input type="hidden" id="userId">
                <div class="row">
                    <div class="form-group">
                        <label class="form-label">Username *</label>
                        <input type="text" id="username" class="form-control" required>
                    </div>
                    <div class="form-group" id="passwordGroup">
                        <label class="form-label">Mật khẩu *</label>
                        <input type="password" id="password" class="form-control">
                    </div>
                </div>
                <div class="row">
                    <div class="form-group">
                        <label class="form-label">Họ tên</label>
                        <input type="text" id="userInfo" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">CCCD</label>
                        <input type="text" id="cccd" class="form-control">
                    </div>
                </div>
                <div class="row">
                    <div class="form-group">
                        <label class="form-label">Số điện thoại</label>
                        <input type="text" id="phone" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phòng ban</label>
                        <select id="departmentId" class="form-control">
                            <option value="">-- Chọn --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Vai trò</label>
                        <select id="role" class="form-control">
                            <option value="USER">User</option>
                            <option value="ADMIN">Admin</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('userModal')">Hủy</button>
                    <button type="submit" class="btn btn-primary">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <div id="resetPasswordModal" class="modal">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h2>Reset mật khẩu</h2>
                <span class="modal-close" onclick="closeModal('resetPasswordModal')">&times;</span>
            </div>
            <form id="resetPasswordForm" class="modal-form">
                <input type="hidden" id="resetUserId">
                <div class="form-group">
                    <label class="form-label">Mật khẩu mới *</label>
                    <input type="password" id="newPassword" class="form-control" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('resetPasswordModal')">Hủy</button>
                    <button type="submit" class="btn btn-primary">Reset</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        // Hàm cập nhật ngày giờ
        function updateDateTime() {
            const now = new Date();
            const optionsDate = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const optionsTime = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            
            document.getElementById('currentDate').textContent = now.toLocaleDateString('vi-VN', optionsDate);
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('vi-VN', optionsTime);
        }

        // Cập nhật ngày giờ ngay khi tải trang và mỗi giây
        updateDateTime();
        setInterval(updateDateTime, 1000);
        
        let currentEditId = null;
        let departments = [];

        // Check admin auth
        if (!AUTH.requireAuth() || !AUTH.requireAdmin()) {
            window.location.href = '/pages/login.html';
        } else {
            init();
        }

        // Initialize
        async function init() {
            const user = AUTH.getCurrentUser();
            document.getElementById('adminName').textContent = user.userInfo || user.username || 'Người dùng';
            await loadDepartments();
            await loadUsers();
        }

        // Load departments
        async function loadDepartments() {
            try {
                const response = await API.get('/departments');
                departments = response.departments;
                
                // Fill filter dropdown
                const filterSelect = document.getElementById('filterDepartment');
                filterSelect.innerHTML = '<option value="">Tất cả</option>';
                departments.forEach(dept => {
                    filterSelect.innerHTML += `<option value="${dept.departmentId}">${dept.name}</option>`;
                });
                
                // Fill modal dropdown
                const modalSelect = document.getElementById('departmentId');
                modalSelect.innerHTML = '<option value="">-- Chọn --</option>';
                departments.forEach(dept => {
                    modalSelect.innerHTML += `<option value="${dept.departmentId}">${dept.name}</option>`;
                });
            } catch (error) {
                console.error('Load departments error:', error);
            }
        }

        // Load users
        async function loadUsers() {
            try {
                const tbody = document.getElementById('usersTableBody');
                tbody.innerHTML = `<tr><td colspan="7" class="text-center"><div class="spinner"></div></td></tr>`;
                
                const params = new URLSearchParams();
                const dept = document.getElementById('filterDepartment').value;
                const status = document.getElementById('filterStatus').value;
                const role = document.getElementById('filterRole').value;
                
                if (dept) params.append('department', dept);
                if (status) params.append('status', status);
                if (role) params.append('role', role);
                
                const url = '/users' + (params.toString() ? '?' + params.toString() : '');
                const response = await API.get(url);
                
                displayUsers(response.users);
            } catch (error) {
                console.error('Load users error:', error);
                showAlert('Không thể tải danh sách người dùng', 'danger');
            }
        }

        // Display users
        function displayUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            
            if (!users || users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="no-data-message">Không có dữ liệu người dùng nào được tìm thấy.</td></tr>';
                return;
            }
            
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.username}</td>
                    <td>${user.userInfo || '-'}</td>
                    <td>${user.name || '-'}</td>
                    <td>
                        <span class="badge ${user.role === 'ADMIN' ? 'badge-primary' : 'badge-secondary'}">
                            ${user.role}
                        </span>
                    </td>
                    <td>${user.phone || '-'}</td>
                    <td>
                        <span class="badge ${user.is_active ? 'badge-success' : 'badge-danger'}">
                            ${user.is_active ? 'Đang hoạt động' : 'Ngưng hoạt động'}
                        </span>
                    </td>
                    <td class="table-actions">
                        <button class="btn btn-sm btn-gold" onclick="editUser(${user.userId})">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-sm btn-primary" onclick="resetPassword(${user.userId})">
                            <i class="fas fa-key"></i>
                        </button>
                        ${user.is_active 
                            ? `<button class="btn btn-sm btn-danger" onclick="toggleUserStatus(${user.userId}, false)">
                                <i class="fas fa-ban"></i>
                               </button>`
                            : `<button class="btn btn-sm btn-success" onclick="toggleUserStatus(${user.userId}, true)">
                                <i class="fas fa-check"></i>
                               </button>`
                        }
                    </td>
                </tr>
            `).join('');
        }

        // Show add user modal
        function showAddUserModal() {
            currentEditId = null;
            document.getElementById('modalTitle').textContent = 'Thêm người dùng';
            document.getElementById('userForm').reset();
            document.getElementById('username').disabled = false;
            document.getElementById('passwordGroup').style.display = 'block';
            document.getElementById('password').required = true;
            document.getElementById('userModal').style.display = 'flex';
        }

        // Edit user
        async function editUser(userId) {
            try {
                const response = await API.get(`/users/${userId}`);
                const user = response.user;
                
                currentEditId = userId;
                document.getElementById('modalTitle').textContent = 'Cập nhật người dùng';
                document.getElementById('userId').value = userId;
                document.getElementById('username').value = user.username;
                document.getElementById('username').disabled = true;
                document.getElementById('passwordGroup').style.display = 'none';
                document.getElementById('password').required = false;
                document.getElementById('userInfo').value = user.userInfo || '';
                document.getElementById('cccd').value = user.cccd || '';
                document.getElementById('phone').value = user.phone || '';
                document.getElementById('departmentId').value = user.departmentId || '';
                document.getElementById('role').value = user.role;
                
                document.getElementById('userModal').style.display = 'flex';
            } catch (error) {
                showAlert('Không thể tải thông tin người dùng', 'danger');
            }
        }

        // Close modal
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // Handle form submit
        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                username: document.getElementById('username').value,
                userInfo: document.getElementById('userInfo').value,
                cccd: document.getElementById('cccd').value,
                phone: document.getElementById('phone').value,
                departmentId: document.getElementById('departmentId').value || null,
                role: document.getElementById('role').value
            };
            
            if (!currentEditId) {
                data.password = document.getElementById('password').value;
            }
            
            try {
                if (currentEditId) {
                    await API.put(`/users/${currentEditId}`, data);
                    showAlert('Cập nhật người dùng thành công', 'success');
                } else {
                    await API.post('/users', data);
                    showAlert('Thêm người dùng thành công', 'success');
                }
                closeModal('userModal');
                loadUsers();
            } catch (error) {
                showAlert(error.message || 'Có lỗi xảy ra', 'danger');
            }
        });

        // Toggle user status
        async function toggleUserStatus(userId, activate) {
            if (!confirm(`Bạn có chắc muốn ${activate ? 'kích hoạt' : 'vô hiệu hóa'} người dùng này?`)) {
                return;
            }
            
            try {
                if (activate) {
                    await API.put(`/users/${userId}/activate`);
                } else {
                    await API.delete(`/users/${userId}`);
                }
                showAlert('Cập nhật trạng thái thành công', 'success');
                loadUsers();
            } catch (error) {
                showAlert('Không thể cập nhật trạng thái', 'danger');
            }
        }

        // Reset password
        function resetPassword(userId) {
            document.getElementById('resetUserId').value = userId;
            document.getElementById('resetPasswordForm').reset();
            document.getElementById('resetPasswordModal').style.display = 'flex';
        }

        // Handle reset password
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userId = document.getElementById('resetUserId').value;
            const password = document.getElementById('newPassword').value;
            
            try {
                await API.put(`/users/${userId}/reset-password`, { password });
                showAlert('Reset mật khẩu thành công', 'success');
                closeModal('resetPasswordModal');
            } catch (error) {
                showAlert('Không thể reset mật khẩu', 'danger');
            }
        });
    </script>
