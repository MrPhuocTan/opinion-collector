<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Quản lý người dùng - Admin</title>
   <link rel="stylesheet" href="../css/style.css">
   <style>
       .modal {
           display: none;
           position: fixed;
           z-index: 1000;
           left: 0;
           top: 0;
           width: 100%;
           height: 100%;
           background-color: rgba(0,0,0,0.4);
       }
       .modal-content {
           background-color: white;
           margin: 5% auto;
           padding: 2rem;
           border-radius: 0.5rem;
           width: 80%;
           max-width: 600px;
       }
       .close {
           color: #aaa;
           float: right;
           font-size: 28px;
           font-weight: bold;
           cursor: pointer;
       }
       .close:hover { color: #000; }
       .badge {
           padding: 0.25rem 0.5rem;
           border-radius: 0.25rem;
           font-size: 0.75rem;
           font-weight: 600;
       }
       .badge-admin {
           background-color: #EF4444;
           color: white;
       }
       .badge-user {
           background-color: #10B981;
           color: white;
       }
   </style>
</head>
<body>
   <nav class="navbar">
       <div class="container">
           <div class="navbar-content">
               <h1 style="color: var(--primary-color);">Quản lý người dùng</h1>
               <div>
                   <a href="admin-dashboard.html" class="btn">Dashboard</a>
                   <a href="admin-requests.html" class="btn">Khảo sát</a>
                   <button class="btn btn-danger" onclick="AUTH.logout()">Đăng xuất</button>
               </div>
           </div>
       </div>
   </nav>
   
   <div class="container">
       <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
           <h2>Danh sách người dùng</h2>
           <button class="btn btn-primary" onclick="openCreateModal()">+ Thêm người dùng</button>
       </div>
       
       <div id="usersList" class="card">
           <div class="loading">
               <div class="spinner"></div>
           </div>
       </div>
   </div>
   
   <!-- Create/Edit User Modal -->
   <div id="userModal" class="modal">
       <div class="modal-content">
           <span class="close" onclick="closeModal()">&times;</span>
           <h2 id="modalTitle">Thêm người dùng mới</h2>
           <form id="userForm">
               <input type="hidden" id="userId">
               <div class="form-group">
                   <label class="form-label">Tên đăng nhập *</label>
                   <input type="text" id="user_name" class="form-control" required>
               </div>
               <div class="form-group" id="passwordGroup">
                   <label class="form-label">Mật khẩu *</label>
                   <input type="password" id="user_pass" class="form-control">
               </div>
               <div class="form-group">
                   <label class="form-label">Họ và tên *</label>
                   <input type="text" id="user_info" class="form-control" required>
               </div>
               <div class="form-group">
                   <label class="form-label">Số điện thoại *</label>
                   <input type="tel" id="user_phone" class="form-control" required>
               </div>
               <div class="form-group">
                   <label class="form-label">CCCD</label>
                   <input type="text" id="user_cccd" class="form-control">
               </div>
               <div class="form-group">
                   <label class="form-label">Phòng ban</label>
                   <select id="depart_id" class="form-control">
                       <option value="">-- Chọn phòng ban --</option>
                   </select>
               </div>
               <div class="form-group">
                   <label class="form-label">Vai trò</label>
                   <select id="user_role" class="form-control">
                       <option value="USER">User</option>
                       <option value="ADMIN">Admin</option>
                   </select>
               </div>
               <div style="display: flex; gap: 1rem;">
                   <button type="submit" class="btn btn-primary">Lưu</button>
                   <button type="button" class="btn" onclick="closeModal()">Hủy</button>
               </div>
           </form>
       </div>
   </div>
   
   <script src="../js/config.js"></script>
   <script src="../js/api.js"></script>
   <script src="../js/auth.js"></script>
   <script>
       if (!AUTH.requireAuth() || !AUTH.isAdmin()) {
           window.location.href = 'login.html';
       }
       
       let departments = [];
       
       async function loadDepartments() {
           try {
               const response = await API.get('/departments');
               departments = response.departments;
               const select = document.getElementById('depart_id');
               select.innerHTML = '<option value="">-- Chọn phòng ban --</option>';
               departments.forEach(dept => {
                   select.innerHTML += `<option value="${dept.id}">${dept.name}</option>`;
               });
           } catch (error) {
               console.error('Error loading departments:', error);
           }
       }
       
       async function loadUsers() {
           try {
               const response = await API.get('/users');
               const container = document.getElementById('usersList');
               
               if (response.users.length === 0) {
                   container.innerHTML = '<p>Chưa có người dùng nào</p>';
               } else {
                   container.innerHTML = `
                       <table class="table">
                           <thead>
                               <tr>
                                   <th>ID</th>
                                   <th>Tên đăng nhập</th>
                                   <th>Họ và tên</th>
                                   <th>Số điện thoại</th>
                                   <th>Phòng ban</th>
                                   <th>Vai trò</th>
                                   <th>Số câu trả lời</th>
                                   <th>Hành động</th>
                               </tr>
                           </thead>
                           <tbody>
                               ${response.users.map(user => `
                                   <tr>
                                       <td>${user.id}</td>
                                       <td>${user.username}</td>
                                       <td>${user.fullName}</td>
                                       <td>${user.phone || 'N/A'}</td>
                                       <td>${user.departmentName || 'N/A'}</td>
                                       <td>
                                           <span class="badge ${user.role === 'ADMIN' ? 'badge-admin' : 'badge-user'}">
                                               ${user.role}
                                           </span>
                                       </td>
                                       <td>${user.totalAnswers || 0}</td>
                                       <td>
                                           <button class="btn btn-sm" onclick="editUser(${user.id})">Sửa</button>
                                           <button class="btn btn-sm btn-danger" onclick="deleteUser(${user.id})">Xóa</button>
                                       </td>
                                   </tr>
                               `).join('')}
                           </tbody>
                       </table>
                   `;
               }
           } catch (error) {
               console.error('Error loading users:', error);
           }
       }
       
       function openCreateModal() {
           document.getElementById('modalTitle').textContent = 'Thêm người dùng mới';
           document.getElementById('userForm').reset();
           document.getElementById('userId').value = '';
           document.getElementById('passwordGroup').style.display = 'block';
           document.getElementById('user_pass').required = true;
           document.getElementById('user_name').disabled = false;
           document.getElementById('userModal').style.display = 'block';
       }
       
       async function editUser(id) {
           try {
               const response = await API.get(`/users/${id}`);
               const user = response.user;
               document.getElementById('modalTitle').textContent = 'Cập nhật người dùng';
               document.getElementById('userId').value = id;
               document.getElementById('user_name').value = user.username;
               document.getElementById('user_name').disabled = true;
               document.getElementById('passwordGroup').style.display = 'none';
               document.getElementById('user_pass').required = false;
               document.getElementById('user_info').value = user.fullName;
               document.getElementById('user_phone').value = user.phone || '';
               document.getElementById('user_cccd').value = user.citizenId || '';
               document.getElementById('depart_id').value = user.departmentId || '';
               document.getElementById('user_role').value = user.role;
               document.getElementById('userModal').style.display = 'block';
           } catch (error) {
               alert('Không thể tải thông tin người dùng');
           }
       }
       
       function closeModal() {
           document.getElementById('userModal').style.display = 'none';
       }
       
       document.getElementById('userForm').addEventListener('submit', async (e) => {
           e.preventDefault();
           
           const id = document.getElementById('userId').value;
           const data = {
               username: document.getElementById('user_name').value,
               fullName: document.getElementById('user_info').value,
               phone: document.getElementById('user_phone').value,
               citizenId: document.getElementById('user_cccd').value,
               departmentId: document.getElementById('depart_id').value || null,
               role: document.getElementById('user_role').value
           };
           
           if (!id) {
               data.password = document.getElementById('user_pass').value;
           }
           
           try {
               if (id) {
                   await API.put(`/users/${id}`, data);
                   alert('Cập nhật thành công!');
               } else {
                   await API.post('/users', data);
                   alert('Thêm người dùng thành công!');
               }
               closeModal();
               loadUsers();
           } catch (error) {
               alert('Có lỗi xảy ra!');
           }
       });
       
       async function deleteUser(id) {
           if (confirm('Bạn có chắc muốn xóa người dùng này?')) {
               try {
                   await API.delete(`/users/${id}`);
                   alert('Xóa thành công!');
                   loadUsers();
               } catch (error) {
                   alert('Không thể xóa người dùng!');
               }
           }
       }
       
       // Load initial data
       loadDepartments();
       loadUsers();
   </script>
</body>
</html>
