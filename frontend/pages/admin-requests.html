<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Khảo sát - Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
        }
        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 2rem;
            border-radius: 0.5rem;
            width: 80%;
            max-width: 700px;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover { color: #000; }
        .editor-container {
            height: 200px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-content">
                <h1 style="color: var(--primary-color);">Quản lý Khảo sát</h1>
                <div>
                    <a href="admin-dashboard.html" class="btn">Dashboard</a>
                    <a href="admin-users.html" class="btn">Users</a>
                    <button class="btn btn-danger" onclick="AUTH.logout()">Đăng xuất</button>
                </div>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h2>Danh sách khảo sát</h2>
            <button class="btn btn-primary" onclick="openCreateModal()">+ Tạo khảo sát mới</button>
        </div>
        
        <div id="requestsList" class="card">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </div>
    
    <!-- Create/Edit Modal -->
    <div id="requestModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Tạo khảo sát mới</h2>
            <form id="requestForm">
                <input type="hidden" id="requestId">
                <div class="form-group">
                    <label class="form-label">Tên khảo sát *</label>
                    <input type="text" id="req_name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Mô tả (Hỗ trợ Format văn bản)</label>
                    <div id="editor" class="editor-container"></div>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 3rem;">
                    <button type="submit" class="btn btn-primary">Lưu</button>
                    <button type="button" class="btn" onclick="closeModal()">Hủy</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        if (!AUTH.requireAuth() || !AUTH.isAdmin()) {
            window.location.href = 'login.html';
        }

        // Initialize Quill editor
        var quill = new Quill('#editor', {
            theme: 'snow',
            placeholder: 'Nhập mô tả...',
            modules: {
                toolbar: [
                    ['bold', 'italic', 'underline', 'strike'],
                    ['blockquote', 'code-block'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    [{ 'script': 'sub'}, { 'script': 'super' }],
                    [{ 'indent': '-1'}, { 'indent': '+1' }],
                    [{ 'color': [] }, { 'background': [] }],
                    [{ 'align': [] }],
                    ['clean']
                ]
            }
        });
        
        async function loadRequests() {
            try {
                const response = await API.get('/requests');
                const container = document.getElementById('requestsList');
                
                if (response.requests.length === 0) {
                    container.innerHTML = '<p>Chưa có khảo sát nào</p>';
                } else {
                    container.innerHTML = `
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Tên khảo sát</th>
                                    <th>Mô tả</th>
                                    <th>Người tạo</th>
                                    <th>Ngày tạo</th>
                                    <th>Số văn kiện</th>
                                    <th>Hành động</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${response.requests.map(req => `
                                    <tr>
                                        <td>${req.id}</td>
                                        <td>${req.title}</td>
                                        <td><div style="max-height: 100px; overflow-y: auto;">${req.description || 'N/A'}</div></td>
                                        <td>${req.creatorName || 'N/A'}</td>
                                        <td>${new Date(req.createdAt).toLocaleDateString('vi-VN')}</td>
                                        <td>${req.documentCount || 0}</td>
                                        <td>
                                            <button class="btn btn-sm" onclick="viewRequest(${req.id})">Xem</button>
                                            <button class="btn btn-sm" onclick="editRequest(${req.id})">Sửa</button>
                                            <button class="btn btn-sm btn-danger" onclick="deleteRequest(${req.id})">Xóa</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                }
            } catch (error) {
                console.error('Error loading requests:', error);
            }
        }
        
        function openCreateModal() {
            document.getElementById('modalTitle').textContent = 'Tạo khảo sát mới';
            document.getElementById('requestForm').reset();
            document.getElementById('requestId').value = '';
            quill.root.innerHTML = '';
            document.getElementById('requestModal').style.display = 'block';
        }
        
        async function editRequest(id) {
            try {
                const response = await API.get(`/requests/${id}`);
                document.getElementById('modalTitle').textContent = 'Cập nhật khảo sát';
                document.getElementById('requestId').value = id;
                document.getElementById('req_name').value = response.request.title;
                quill.root.innerHTML = response.request.description || '';
                document.getElementById('requestModal').style.display = 'block';
            } catch (error) {
                alert('Không thể tải thông tin khảo sát');
            }
        }
        
        function closeModal() {
            document.getElementById('requestModal').style.display = 'none';
        }
        
        document.getElementById('requestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('requestId').value;
            const data = {
                title: document.getElementById('req_name').value,
                description: quill.root.innerHTML
            };
            
            try {
                if (id) {
                    await API.put(`/requests/${id}`, data);
                    alert('Cập nhật thành công!');
                } else {
                    await API.post('/requests', data);
                    alert('Tạo khảo sát thành công!');
                }
                closeModal();
                loadRequests();
            } catch (error) {
                alert('Có lỗi xảy ra!');
            }
        });
        
        async function deleteRequest(id) {
            if (confirm('Bạn có chắc muốn xóa khảo sát này?')) {
                try {
                    await API.delete(`/requests/${id}`);
                    alert('Xóa thành công!');
                    loadRequests();
                } catch (error) {
                    alert('Không thể xóa khảo sát!');
                }
            }
        }
        
        function viewRequest(id) {
            window.location.href = `admin-request-detail.html?id=${id}`;
        }
        
        loadRequests();
    </script>
</body>
</html>
